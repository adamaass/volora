<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volora — Deals de vols</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // ====== TALLY + STRIPE — VOLORA ======
      (function () {
        var TALLY_FORM_ID = "QKYEYg";
        var TALLY_EMAIL_FIELD = "42a18969-0098-4c5d-bb4e-456554a23053";
        var STRIPE_LINK = "https://buy.stripe.com/9B600ja9ccN7b7FgKweQM0e";

        function generateUUID() {
          return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
            var r = (Math.random() * 16) | 0;
            var v = c === "x" ? r : (r & 0x3) | 0x8;
            return v.toString(16);
          });
        }

        function sendToTallyAndStripe(email) {
          fetch("https://api.tally.so/forms/" + TALLY_FORM_ID + "/respond", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              sessionUuid: generateUUID(),
              respondentUuid: generateUUID(),
              responses: (function () {
                var o = {};
                o[TALLY_EMAIL_FIELD] = email;
                return o;
              })(),
              isCompleted: true,
              password: null,
              captchas: {},
            }),
          }).catch(function () {});

          setTimeout(function () {
            window.location.href =
              STRIPE_LINK + "?prefilled_email=" + encodeURIComponent(email);
          }, 600);
        }

        function bindForms() {
          document.querySelectorAll("form").forEach(function (f) {
            if (f.dataset.voloraTallyBound) return;
            f.dataset.voloraTallyBound = "1";
            f.addEventListener("submit", function (e) {
              e.preventDefault();
              var emailInput = this.querySelector('input[type="email"]');
              if (emailInput && emailInput.value) {
                var btn = this.querySelector('button[type="submit"]');
                if (btn) {
                  btn.textContent = "Redirection...";
                  btn.disabled = true;
                  btn.style.opacity = "0.7";
                }
                sendToTallyAndStripe(emailInput.value);
              }
            });
          });
        }

        bindForms();
        var root = document.getElementById("root");
        if (root) {
          new MutationObserver(function () {
            bindForms();
          }).observe(root, { childList: true, subtree: true });
        }
      })();
    </script>
  </body>
</html>
